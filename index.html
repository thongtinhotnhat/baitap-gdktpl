<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập – Hiến pháp CHXHCN Việt Nam</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --navy: #1a2744;
    --gold: #c8942a;
    --gold-light: #f0d89a;
    --green: #2d6a4f;
    --green-bg: #d8f3dc;
    --red: #8b2020;
    --red-bg: #ffe5e5;
    --muted: #6b7280;
    --border: #ddd3be;
    --shadow: 0 2px 12px rgba(26,39,68,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    padding: 28px 24px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,.25);
  }
  header h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    font-weight: 700;
    letter-spacing: .01em;
    line-height: 1.3;
  }
  header .subtitle {
    font-size: .85rem;
    color: var(--gold-light);
    margin-top: 4px;
    font-weight: 300;
  }
  .header-controls {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.1);
    color: #fff;
    font-family: inherit;
    font-size: .9rem;
    outline: none;
    transition: border .2s;
  }
  .search-box::placeholder { color: rgba(255,255,255,.5); }
  .search-box:focus { border-color: var(--gold); }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    transition: all .2s;
  }
  .btn-gold {
    background: var(--gold);
    color: #fff;
  }
  .btn-gold:hover { background: #a8771e; }
  .btn-outline {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.35);
  }
  .btn-outline:hover { background: rgba(255,255,255,.12); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 12px 24px;
    background: var(--gold);
    color: #fff;
    font-size: .82rem;
    font-weight: 600;
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 5px; }

  /* ── FILTER TABS ── */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 14px 24px;
    overflow-x: auto;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--navy);
    cursor: pointer;
    font-family: inherit;
    font-size: .82rem;
    font-weight: 600;
    white-space: nowrap;
    transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }

  /* ── MAIN ── */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 14px;
  }
  .section-label h2 {
    font-family: 'Lora', serif;
    font-size: 1rem;
    color: var(--gold);
    font-weight: 700;
    white-space: nowrap;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow .2s;
  }
  .q-card:hover { box-shadow: 0 4px 20px rgba(26,39,68,.13); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 18px 14px;
    cursor: pointer;
    user-select: none;
  }
  .q-num {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--navy);
    color: #fff;
    font-size: .78rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .q-text {
    flex: 1;
    font-size: .95rem;
    line-height: 1.55;
    font-weight: 400;
    color: var(--navy);
  }
  .q-toggle {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .75rem;
    color: var(--muted);
    transition: all .2s;
    margin-top: 2px;
  }
  .q-card.open .q-toggle {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
    transform: rotate(180deg);
  }

  /* ── ANSWERS ── */
  .q-body {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
  }
  .q-card.open .q-body { display: block; }

  .options {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 13px;
    border-radius: 8px;
    font-size: .9rem;
    line-height: 1.45;
    border: 1.5px solid var(--border);
    background: var(--bg);
    transition: all .15s;
  }
  .option.correct {
    background: var(--green-bg);
    border-color: #52b788;
    color: var(--green);
    font-weight: 600;
  }
  .option-key {
    flex-shrink: 0;
    font-weight: 700;
    font-size: .85rem;
    min-width: 18px;
  }
  .correct-badge {
    margin-left: auto;
    flex-shrink: 0;
    font-size: .75rem;
    background: var(--green);
    color: #fff;
    padding: 2px 7px;
    border-radius: 10px;
    align-self: center;
  }

  /* ── TRUE/FALSE ── */
  .tf-item {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
  }
  .tf-stmt {
    font-size: .9rem;
    line-height: 1.5;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .tf-answer {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: .82rem;
    font-weight: 700;
    letter-spacing: .04em;
  }
  .tf-answer.dung {
    background: var(--green-bg);
    color: var(--green);
    border: 1.5px solid #52b788;
  }
  .tf-answer.sai {
    background: var(--red-bg);
    color: var(--red);
    border: 1.5px solid #f4a2a2;
  }
  .tf-label {
    font-size: .78rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* ── HIGHLIGHT (search) ── */
  mark {
    background: var(--gold-light);
    color: var(--navy);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: .95rem;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* ── BACK TO TOP ── */
  #btt {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: background .2s;
  }
  #btt:hover { background: var(--gold); }
  #btt.visible { display: flex; }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .q-header { padding: 13px 14px 12px; }
    .q-body { padding: 0 14px 14px; }
    .q-text { font-size: .88rem; }
    main { padding: 14px 10px 50px; }
  }
</style>
</head>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentFilter = 'all';
let searchTerm = '';

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
const keys = ['A','B','C','D'];

function hl(text) {
  if (!searchTerm) return text;
  const re = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function buildMC(q) {
  const optHtml = q.opts.map((o,i) => {
    const correct = i === q.ans;
    return `<div class="option${correct?' correct':''}">
      <span class="option-key">${keys[i]}.</span>
      <span>${hl(o)}</span>
      ${correct ? '<span class="correct-badge">✓ Đúng</span>' : ''}
    </div>`;
  }).join('');
  return `<div class="q-card" id="mc-${q.n}" data-type="mc">
    <div class="q-header" onclick="toggle(this)">
      <div class="q-num">${q.n}</div>
      <div class="q-text">${hl(q.q)}</div>
      <div class="q-toggle">▼</div>
    </div>
    <div class="q-body">
      <div class="options">${optHtml}</div>
    </div>
  </div>`;
}

function buildTF(group) {
  const itemHtml = group.items.map((it, i) => {
    const label = String.fromCharCode(97+i); // a,b,c,d
    return `<div class="tf-item">
      <div class="tf-label">Ý ${label}</div>
      <div class="tf-stmt">${hl(it.s)}</div>
      <span class="tf-answer ${it.a?'dung':'sai'}">${it.a ? '✓ ĐÚNG' : '✗ SAI'}</span>
    </div>`;
  }).join('');
  return `<div class="q-card" id="tf-${group.n}" data-type="tf">
    <div class="q-header" onclick="toggle(this)">
      <div class="q-num">${group.n}</div>
      <div class="q-text">Xác định đúng / sai cho các phát biểu sau (Câu ${group.n})</div>
      <div class="q-toggle">▼</div>
    </div>
    <div class="q-body">${itemHtml}</div>
  </div>`;
}

function render() {
  const main = document.getElementById('main');
  const term = searchTerm.toLowerCase();

  const filteredMC = mc.filter(q => {
    if (currentFilter === 'tf') return false;
    if (!term) return true;
    return q.q.toLowerCase().includes(term) || q.opts.some(o => o.toLowerCase().includes(term));
  });
  const filteredTF = tf.filter(g => {
    if (currentFilter === 'mc') return false;
    if (!term) return true;
    return g.items.some(it => it.s.toLowerCase().includes(term));
  });

  let html = '';

  if (filteredMC.length > 0 && currentFilter !== 'tf') {
    html += `<div class="section-label"><h2>📝 Trắc nghiệm</h2><div class="section-line"></div></div>`;
    html += filteredMC.map(buildMC).join('');
  }

  if (filteredTF.length > 0 && currentFilter !== 'mc') {
    html += `<div class="section-label"><h2>⚖️ Đúng / Sai</h2><div class="section-line"></div></div>`;
    html += filteredTF.map(buildTF).join('');
  }

  if (filteredMC.length === 0 && filteredTF.length === 0) {
    html = `<div class="empty"><div class="icon">🔍</div>Không tìm thấy câu hỏi phù hợp.</div>`;
  }

  main.innerHTML = html;

  document.getElementById('totalCount').textContent = filteredMC.length + filteredTF.reduce((s,g)=>s+g.items.length,0);
  document.getElementById('mcCount').textContent = filteredMC.length;
  document.getElementById('tfCount').textContent = filteredTF.reduce((s,g)=>s+g.items.length,0);
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────
function toggle(header) {
  header.parentElement.classList.toggle('open');
}
function expandAll() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('open'));
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  render();
  if (searchTerm) expandAll();
});

window.addEventListener('scroll', () => {
  document.getElementById('btt').classList.toggle('visible', window.scrollY > 300);
});

render();
</script>
</body>
